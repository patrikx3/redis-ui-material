<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P3X Redis UI</title>
    <link rel="icon" type="image/svg+xml" href="/images/redis.svg" />

</head>
<body>
    <script>try { if (window.parent === window && localStorage.getItem('p3xr-frontend') !== 'react' && location.pathname.startsWith('/react')) location.replace('/' + location.search) } catch(e) {}</script>

    <div id="p3xr-loading">
        <style>
            #p3xr-loading {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background-color: rgba(0, 0, 0, 0.1);
            }
            .LoaderBalls {
                width: 90px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin: 20px auto;
            }
            .LoaderBalls__item {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.5);
            }
            .LoaderBalls__item:nth-child(1) { animation: bouncing 0.4s alternate infinite cubic-bezier(0.6, 0.05, 0.15, 0.95); }
            .LoaderBalls__item:nth-child(2) { animation: bouncing 0.4s 0.1s alternate infinite cubic-bezier(0.6, 0.05, 0.15, 0.95) backwards; }
            .LoaderBalls__item:nth-child(3) { animation: bouncing 0.4s 0.2s alternate infinite cubic-bezier(0.6, 0.05, 0.15, 0.95) backwards; }
            @keyframes bouncing {
                0%   { transform: translate3d(0, 10px, 0) scale(1.2, 0.85); }
                100% { transform: translate3d(0, -20px, 0) scale(0.9, 1.1); }
            }
        </style>
        <div class="LoaderBalls">
            <div class="LoaderBalls__item"></div>
            <div class="LoaderBalls__item"></div>
            <div class="LoaderBalls__item"></div>
        </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
</body>
</html>
